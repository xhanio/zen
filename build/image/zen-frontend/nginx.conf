server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # SPA: any unknown path falls back to index.html so the Vue Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # MCP HTTP/SSE → zen-mcp. Must be declared BEFORE /api/ so this more
    # specific prefix wins; SSE settings per design doc §3.4.
    location /api/v1/mcp {
        proxy_pass http://zen-mcp:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    # WebSocket upgrade for every WS endpoint the backend serves.
    #
    #   /api/v1/conversations/<id>/ws       per-conversation stream
    #   /api/v1/conversations/_stream/ws    channel fan-out (matches [^/]+)
    #   /api/v1/_sessions/ws                v0.13 SPA control stream:
    #                                       presence snapshots + delivery frames
    #
    # A path missing from this regex falls through to `location /api/`, which
    # sets no Upgrade header, and the dial fails with 426 Upgrade Required.
    # Add new WS endpoints here or they are silently dead behind the proxy.
    location ~ ^/api/v1/(conversations/[^/]+/ws|_sessions/ws)$ {
        proxy_pass http://zen-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # REST API → zen-backend (preserve the /api/v1 prefix; backend's router uses it).
    location /api/ {
        proxy_pass http://zen-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
